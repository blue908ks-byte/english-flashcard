<!doctype html><html lang="ko"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>수능 단어 플래시카드</title><link rel="stylesheet" href="style.css"/></head><body><div class="app"><header><h1>수능 단어 플래시카드</h1><p>예문을 먼저 보고, 뜻 보기로 암기 여부를 확인하세요.</p></header><section class="controls"><label>그룹 선택</label><select id="groupSelect"></select><div class="row"><button id="shuffleBtn">랜덤 섞기</button><button id="wrongOnlyBtn">오답만 보기</button><button id="allBtn">전체 보기</button></div></section><main class="card"><div class="meta"><span id="groupName"></span><span id="counter"></span></div><div class="example" id="example"></div><button class="primary" id="showBtn">뜻 보기</button><div class="answer hidden" id="answer"><h2 id="word"></h2><p class="meaning" id="meaning"></p><p class="translation" id="translation"></p><div class="row"><button id="knownBtn">암기함</button><button id="wrongBtn">모름 / 오답 저장</button></div></div><div class="row nav"><button id="prevBtn">이전</button><button id="nextBtn">다음</button></div></main><section class="wrong"><div class="wrong-head"><h2>오답노트</h2><button id="clearWrongBtn">오답 전체 삭제</button></div><p id="wrongCount"></p><div id="wrongList"></div></section></div><script src="data.js"></script><script src="app.js"></script></body></html>
